<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a1a2e">
<title>日記を書く</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --surface2: #0f3460;
    --accent: #e2b96f;
    --accent2: #f5d08a;
    --text: #f0ece2;
    --text2: #a89f8c;
    --border: rgba(226,185,111,0.2);
    --radius: 16px;
  }

  body {
    font-family: 'Noto Sans JP', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
    padding-bottom: 40px;
  }

  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 20px 14px;
    position: sticky;
    top: 0;
    z-index: 10;
  }

  header h1 {
    font-size: 17px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.05em;
  }

  header p {
    font-size: 12px;
    color: var(--text2);
    margin-top: 2px;
  }

  .container { padding: 20px 16px; max-width: 540px; margin: 0 auto; }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 18px;
    margin-bottom: 16px;
  }

  .card-title {
    font-size: 11px;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 14px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .card-title::before {
    content: '';
    display: inline-block;
    width: 3px;
    height: 12px;
    background: var(--accent);
    border-radius: 2px;
  }

  label {
    display: block;
    font-size: 12px;
    color: var(--text2);
    margin-bottom: 6px;
    margin-top: 14px;
  }

  label:first-of-type { margin-top: 0; }

  input[type="text"],
  input[type="password"],
  textarea {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    font-size: 15px;
    font-family: 'Noto Sans JP', sans-serif;
    color: var(--text);
    outline: none;
    -webkit-appearance: none;
    transition: border-color 0.2s;
  }

  input[type="text"]:focus,
  input[type="password"]:focus,
  textarea:focus {
    border-color: var(--accent);
  }

  textarea {
    min-height: 130px;
    resize: none;
    line-height: 1.7;
  }

  .token-row {
    display: flex;
    gap: 8px;
    align-items: center;
  }

  .token-row input { flex: 1; }

  .btn-eye {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px;
    color: var(--text2);
    font-size: 16px;
    cursor: pointer;
    flex-shrink: 0;
  }

  .settings-toggle {
    font-size: 12px;
    color: var(--text2);
    cursor: pointer;
    text-align: center;
    padding: 6px;
    border-radius: 8px;
    margin-bottom: 16px;
    border: 1px dashed var(--border);
    transition: color 0.2s;
  }

  .settings-toggle:hover { color: var(--accent); }

  .photo-area {
    border: 1.5px dashed var(--border);
    border-radius: 12px;
    padding: 20px;
    text-align: center;
    cursor: pointer;
    transition: border-color 0.2s;
    position: relative;
  }

  .photo-area:hover { border-color: var(--accent); }

  .photo-area input {
    position: absolute;
    inset: 0;
    opacity: 0;
    cursor: pointer;
    width: 100%;
    height: 100%;
  }

  .photo-area p { font-size: 13px; color: var(--text2); }
  .photo-area span { font-size: 24px; display: block; margin-bottom: 6px; }

  .preview-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 8px;
    margin-top: 12px;
  }

  .preview-grid img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    border-radius: 8px;
    border: 1px solid var(--border);
  }

  .btn-post {
    width: 100%;
    padding: 16px;
    background: var(--accent);
    color: var(--bg);
    border: none;
    border-radius: var(--radius);
    font-size: 16px;
    font-weight: 500;
    font-family: 'Noto Sans JP', sans-serif;
    cursor: pointer;
    letter-spacing: 0.05em;
    transition: opacity 0.2s, transform 0.1s;
    margin-top: 4px;
  }

  .btn-post:active { transform: scale(0.98); opacity: 0.9; }
  .btn-post:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

  .status {
    margin-top: 14px;
    padding: 14px;
    border-radius: 12px;
    font-size: 14px;
    line-height: 1.6;
    display: none;
  }

  .status.loading {
    display: block;
    background: rgba(226,185,111,0.1);
    border: 1px solid var(--border);
    color: var(--accent2);
  }

  .status.ok {
    display: block;
    background: rgba(74,222,128,0.1);
    border: 1px solid rgba(74,222,128,0.3);
    color: #86efac;
  }

  .status.err {
    display: block;
    background: rgba(248,113,113,0.1);
    border: 1px solid rgba(248,113,113,0.3);
    color: #fca5a5;
  }

  .dots::after {
    content: '';
    animation: dots 1.2s infinite;
  }

  @keyframes dots {
    0%   { content: ''; }
    33%  { content: '.'; }
    66%  { content: '..'; }
    100% { content: '...'; }
  }

  .site-link {
    display: block;
    text-align: center;
    font-size: 13px;
    color: var(--text2);
    margin-top: 20px;
    text-decoration: none;
  }

  .site-link span { color: var(--accent); }
</style>
</head>
<body>

<header>
  <h1>HIRO家の日記</h1>
  <p id="today-date"></p>
</header>

<div class="container">

  <div class="settings-toggle" id="settings-toggle" onclick="toggleSettings()">
    ⚙ 設定（初回のみ）
  </div>

  <div id="settings-card" class="card" style="display:none">
    <div class="card-title">API設定</div>

    <label>GitHub Token</label>
    <div class="token-row">
      <input type="password" id="gh-token" placeholder="ghp_xxxxxxxxxxxx" oninput="saveSettings()" />
      <button class="btn-eye" onclick="toggleVis('gh-token', this)">👁</button>
    </div>

    <label>Anthropic API Key</label>
    <div class="token-row">
      <input type="password" id="api-key" placeholder="sk-ant-xxxxxxxxxxxx" oninput="saveSettings()" />
      <button class="btn-eye" onclick="toggleVis('api-key', this)">👁</button>
    </div>

    <label>GitHubユーザー名</label>
    <input type="text" id="gh-user" value="hirossvb-freedom" oninput="saveSettings()" />

    <label>リポジトリ名</label>
    <input type="text" id="gh-repo" value="Diary" oninput="saveSettings()" />
  </div>

  <div class="card">
    <div class="card-title">今日のできごと</div>

    <label>タイトル（省略OK）</label>
    <input type="text" id="title" placeholder="例：公園で凧揚げした" />

    <label>メモ（箇条書きでOK）</label>
    <textarea id="memo" placeholder="・子どもたちと公園へ&#10;・凧が木に引っかかって大笑い&#10;・帰りにアイスを食べた"></textarea>
  </div>

  <div class="card">
    <div class="card-title">写真</div>
    <div class="photo-area" id="photo-area">
      <input type="file" id="photos" accept="image/*" multiple onchange="previewImages()" />
      <span>📷</span>
      <p>タップして写真を追加</p>
    </div>
    <div class="preview-grid" id="preview"></div>
  </div>

  <button class="btn-post" id="post-btn" onclick="postDiary()">投稿する</button>
  <div class="status" id="status"></div>

  <a href="https://hirossvb-freedom.github.io/Diary" class="site-link" target="_blank">
    日記サイトを見る →&nbsp;<span>hirossvb-freedom.github.io/Diary</span>
  </a>

</div>

<script>
const $ = id => document.getElementById(id);

function init() {
  const now = new Date();
  $('today-date').textContent = now.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
  const saved = localStorage.getItem('diary-settings');
  if (saved) {
    const s = JSON.parse(saved);
    $('gh-token').value = s.token || '';
    $('api-key').value = s.apikey || '';
    $('gh-user').value = s.user || 'hirossvb-freedom';
    $('gh-repo').value = s.repo || 'Diary';
  } else {
    $('settings-card').style.display = 'block';
    $('settings-toggle').textContent = '⚙ 設定（初回のみ）▲';
  }
}

function saveSettings() {
  localStorage.setItem('diary-settings', JSON.stringify({
    token: $('gh-token').value,
    apikey: $('api-key').value,
    user: $('gh-user').value,
    repo: $('gh-repo').value
  }));
}

function toggleSettings() {
  const card = $('settings-card');
  const visible = card.style.display !== 'none';
  card.style.display = visible ? 'none' : 'block';
  $('settings-toggle').textContent = visible ? '⚙ 設定（初回のみ）' : '⚙ 設定（初回のみ）▲';
}

function toggleVis(id, btn) {
  const el = $(id);
  el.type = el.type === 'password' ? 'text' : 'password';
}

function previewImages() {
  const preview = $('preview');
  preview.innerHTML = '';
  for (const f of $('photos').files) {
    const img = document.createElement('img');
    img.src = URL.createObjectURL(f);
    preview.appendChild(img);
  }
}

function setStatus(msg, type) {
  const s = $('status');
  s.className = 'status ' + type;
  s.innerHTML = msg;
}

async function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = rej;
    r.readAsDataURL(file);
  });
}

async function postDiary() {
  const token = $('gh-token').value.trim();
  const apikey = $('api-key').value.trim();
  const user = $('gh-user').value.trim();
  const repo = $('gh-repo').value.trim();
  const memo = $('memo').value.trim();
  const titleVal = $('title').value.trim();
  const files = $('photos').files;

  if (!token || !apikey) {
    setStatus('設定からGitHub TokenとAPI Keyを入力してください', 'err');
    $('settings-card').style.display = 'block';
    return;
  }
  if (!memo) {
    setStatus('メモを入力してください', 'err');
    return;
  }

  const btn = $('post-btn');
  btn.disabled = true;

  const today = new Date();
  const dateStr = today.toLocaleDateString('ja-JP', { year:'numeric', month:'long', day:'numeric', weekday:'long' });
  const fileSlug = today.toISOString().slice(0,10);

  setStatus('<span class="dots">Claudeが文章を生成中</span>', 'loading');

  try {
    let imageContents = [];
    for (const f of files) {
      const b64 = await fileToBase64(f);
      imageContents.push({ type:'image', source:{ type:'base64', media_type: f.type, data: b64 } });
    }

    const userContent = [
      ...imageContents,
      { type:'text', text:`以下のメモをもとに、自然体・話し言葉の家族日記を書いてください。\n\n日付：${dateStr}\nタイトルメモ：${titleVal || '（なし）'}\n内容メモ：\n${memo}\n\n条件：\n・300〜500文字程度\n・話し言葉でリラックスした雰囲気\n・家族の温かみが伝わる文章\n・タイトルも考えて\n・出力形式：\nTITLE: （タイトル）\nBODY:\n（本文）` }
    ];

    const aiRes = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type':'application/json', 'x-api-key': apikey, 'anthropic-version':'2023-06-01' },
      body: JSON.stringify({ model:'claude-sonnet-4-20250514', max_tokens:1000, messages:[{ role:'user', content: userContent }] })
    });

    const aiData = await aiRes.json();
    if (!aiRes.ok) throw new Error(aiData.error?.message || 'Claude APIエラー');

    const text = aiData.content[0].text;
    const titleMatch = text.match(/TITLE:\s*(.+)/);
    const bodyMatch = text.match(/BODY:\s*([\s\S]+)/);
    const genTitle = titleMatch ? titleMatch[1].trim() : (titleVal || dateStr);
    const genBody = bodyMatch ? bodyMatch[1].trim() : text;

    setStatus('<span class="dots">GitHubに投稿中</span>', 'loading');

    const ghHeaders = { 'Authorization':`token ${token}`, 'Content-Type':'application/json' };
    const fileRes = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/index.html`, { headers: ghHeaders });
    const fileData = await fileRes.json();
    if (!fileRes.ok) throw new Error('index.htmlの取得失敗: ' + fileData.message);

    const currentContent = atob(fileData.content.replace(/\n/g,''));

    const newEntry = `
<div class="entry">
  <div class="date">${dateStr}</div>
  <h2>${genTitle}</h2>
  ${genBody.split('\n').filter(l=>l.trim()).map(l=>`<p>${l}</p>`).join('\n  ')}
</div>`;

    const insertAfter = '<h1>HIRO家の日記 🏠</h1>';
    const updatedContent = currentContent.includes(insertAfter)
      ? currentContent.replace(insertAfter, insertAfter + '\n' + newEntry)
      : currentContent.replace('</body>', newEntry + '\n</body>');

    const encoded = btoa(unescape(encodeURIComponent(updatedContent)));

    const updateRes = await fetch(`https://api.github.com/repos/${user}/${repo}/contents/index.html`, {
      method: 'PUT',
      headers: ghHeaders,
      body: JSON.stringify({ message:`日記追加: ${genTitle}`, content: encoded, sha: fileData.sha })
    });

    const updateData = await updateRes.json();
    if (!updateRes.ok) throw new Error('更新失敗: ' + updateData.message);

    setStatus(`✓ 「${genTitle}」を投稿しました！<br><small style="opacity:0.7">1〜2分後にサイトに反映されます</small>`, 'ok');
    $('memo').value = '';
    $('title').value = '';
    $('preview').innerHTML = '';
    $('photos').value = '';

  } catch(e) {
    setStatus('エラー: ' + e.message, 'err');
  } finally {
    btn.disabled = false;
  }
}

init();
</script>
</body>
</html>
